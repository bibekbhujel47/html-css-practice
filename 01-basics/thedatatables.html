<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>something</title>
    <style>
        table {
            border-collapse: collapse;
        }

        table,
        th,
        td {
            border: 1px solid black;
            padding: 8px;
        }
    </style>
</head>

<body>
    <table>
        <caption>Student's Information</caption>
        <colgroup>
            <col style="background-color: aliceblue;" />
            <col style="background-color: red;" />
            <col style="background-color: purple;" />
        </colgroup>
        <thead>
            <tr>
                <th>Name</th>
                <th>Rollno</th>
                <th>Address</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Bibek</td>
                <td rowspan="2">2</td>
                <td>Pokhara, Damauli</td>
            </tr>

            <tr>
                <td>Bibek</td>
                <td colspan="2">2</td>
                <td>Pokhara, Damauli</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th colspan="3">Grand Total</th>
                <td>$150000</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
